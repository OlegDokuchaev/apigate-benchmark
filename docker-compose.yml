services:
  auth:
    build: ./auth-service
    env_file: ./auth-service/.env
    ports:
      - "8001:8001"

  data:
    build: ./data-service
    env_file: ./data-service/.env
    ports:
      - "8002:8002"

  gateway-apigate:
    build: ./gateway-apigate
    env_file:
      - ./gateway-apigate/.env
      - ./gateway-apigate/.env.docker
    ports:
      - "8080:8080"
    depends_on:
      - auth
      - data
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    sysctls:
      net.ipv4.tcp_keepalive_time: "30"

  gateway-kong:
    build: ./gateway-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8080 backlog=1024 reuseport"
      KONG_ADMIN_LISTEN: "0.0.0.0:8081"
      KONG_PROXY_ACCESS_LOG: "off"
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ACCESS_LOG: "off"
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: notice
      KONG_NGINX_EVENTS_WORKER_CONNECTIONS: "16384"
      KONG_NGINX_HTTP_KEEPALIVE_TIMEOUT: "120s"
      KONG_NGINX_HTTP_KEEPALIVE_REQUESTS: "1000000"
      KONG_NGINX_PROXY_TCP_NODELAY: "on"
      KONG_UPSTREAM_KEEPALIVE_POOL_SIZE: "512"
      KONG_UPSTREAM_KEEPALIVE_MAX_REQUESTS: "1000000"
      KONG_UPSTREAM_KEEPALIVE_IDLE_TIMEOUT: "120"
      KONG_NGINX_PROXY_PROXY_SOCKET_KEEPALIVE: "on"
      KONG_UNTRUSTED_LUA_SANDBOX_REQUIRES: "require_auth,transforms"
    volumes:
      - ./gateway-kong/kong.yml:/kong/kong.yml:ro
      - ./gateway-kong/lua/require_auth.lua:/usr/local/share/lua/5.1/require_auth.lua:ro
      - ./gateway-kong/lua/transforms.lua:/usr/local/share/lua/5.1/transforms.lua:ro
    ports:
      - "8090:8080"
      - "8091:8081"
    depends_on:
      - auth
      - data
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    sysctls:
      net.ipv4.tcp_keepalive_time: "30"

  gateway-apisix:
    build: ./gateway-apisix
    environment:
      APISIX_STAND_ALONE: "true"
    volumes:
      - ./gateway-apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./gateway-apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
      - ./gateway-apisix/lua/require_auth.lua:/usr/local/apisix/lua/require_auth.lua:ro
      - ./gateway-apisix/lua/transforms.lua:/usr/local/apisix/lua/transforms.lua:ro
    ports:
      - "8093:9080"
    depends_on:
      - auth
      - data
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    sysctls:
      net.ipv4.tcp_keepalive_time: "30"

  gateway-python:
    build: ./gateway-python
    environment:
      ORIGIN_BASE_URL: http://data:8002
      AUTH_VERIFY_URL: http://auth:8001/verify
      AIOHTTP_LIMIT_PER_HOST: "512"
      AIOHTTP_KEEPALIVE_TIMEOUT: "120.0"
      AIOHTTP_TCP_KEEPALIVE_IDLE: "30"
      GRANIAN_HTTP1_KEEP_ALIVE: "true"
    ports:
      - "8092:8000"
    depends_on:
      - auth
      - data
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    sysctls:
      net.ipv4.tcp_keepalive_time: "30"

  cadvisor:
    image: ghcr.io/google/cadvisor:0.56.2
    container_name: cadvisor
    privileged: true
    ports:
      - "8099:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - --docker_only=true
      - --housekeeping_interval=1s
      - --storage_duration=10m
      - --disable_metrics=disk,diskIO,tcp,udp,advtcp,percpu,sched,process,hugetlb,referenced_memory,resctrl,cpu_topology,memory_numa
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
